name: CI

# Trigger the workflow on push or pull request, but only for the master branch
on:
  pull_request:
  push:
    branches: [master]

jobs:
  cabal:
    name: ${{ matrix.os }} / ghc ${{ matrix.ghc }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
          - macos-26-intel
          - windows-latest
        cabal: ["3.12.1.0"]
        ghc:
          - 9.8.2

    steps:
    - uses: actions/checkout@v6
      if: github.event.action == 'opened' || github.event.action == 'synchronize' || github.event.ref == 'refs/heads/master'

    - uses: haskell-actions/setup@v2
      id: setup-haskell-cabal
      name: Setup Haskell
      with:
        ghc-version: ${{ matrix.ghc }}
        cabal-version: ${{ matrix.cabal }}

    - name: Set up Docker
      if: runner.os == 'macOS'
      uses: docker/setup-docker-action@v5

    - name: Freeze
      run: |
        cabal freeze
    
    - name: Restore dependency cache
      id: cache
      uses: actions/cache/restore@v5
      env:
        key: ${{ runner.os }}-${{ steps.setup-haskell-cabal.outputs.cabal-version }}-${{ steps.setup-haskell-cabal.outputs.ghc-version }}-${{ github.job }}
      with:
        path: ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
        key: ${{ env.key }}-${{ hashFiles('**/plan.json') }}
        restore-keys: ${{ env.key }}
    - name: Build
      run: |
        cabal configure -O0 --enable-tests --enable-benchmarks --test-show-details=direct
        cabal build all

    # Save the cache immediately after dependencies are built so that the
    # populated store survives even if the build or test steps fail.
    - name: Save dependency cache
      uses: actions/cache/save@v5
      with:
        path: ${{ steps.setup-haskell-cabal.outputs.cabal-store }}
        key: ${{ steps.cache.outputs.cache-primary-key }}

    - name: Wait for Docker to be ready
      if: runner.os == 'Windows'
      shell: pwsh
      # Docker service may still be starting up when fast (cached) builds complete.
      # Poll up to 60 seconds (30 attempts × 2 s) before giving up.
      run: |
        $maxAttempts = 30
        for ($i = 0; $i -lt $maxAttempts; $i++) {
          $output = docker info 2>&1
          if ($LASTEXITCODE -eq 0) {
            Write-Output "Docker is ready"
            exit 0
          }
          Write-Output "Waiting for Docker ($i/$maxAttempts)..."
          Start-Sleep -Seconds 2
        }
        Write-Error "Docker did not become ready"
        exit 1

    - name: Test
      run: |
        cabal test all
