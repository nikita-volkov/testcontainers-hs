name: CI

# Trigger the workflow on push or pull request, but only for the master branch
on:
  pull_request:
  push:
    branches: [master]

jobs:
  cabal:
    strategy:
      fail-fast: false
      matrix:
        os: 
          - ubuntu-latest
          - macos-26-intel
          - windows-latest
        ghc:
          - 9.8.4
          
    runs-on: ${{ matrix.os }}

    name: ${{ matrix.os }} / ghc ${{ matrix.ghc }}

    steps:
      - uses: actions/checkout@v6

      - uses: haskell-actions/setup@v2
        id: setup
        name: Setup Haskell
        with:
          ghc-version: ${{ matrix.ghc }}

      - name: Generate the plan
        run: cabal build all --dry-run --enable-tests

      - name: Restore cached dependencies
        uses: actions/cache/restore@v5
        id: cache
        env:
          key: ${{ runner.os }}-${{ steps.setup.outputs.cabal-version }}-${{ steps.setup.outputs.ghc-version }}-${{ github.job }}
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ env.key }}-${{ hashFiles('**/plan.json') }}
          restore-keys: ${{ env.key }}

      - name: Install dependencies
        shell: bash
        run: cabal build all --only-dependencies --enable-tests -j +RTS -A128m -n2m -N -RTS

      - name: Save dependencies cache
        uses: actions/cache/save@v5
        if: ${{ steps.cache.outputs.cache-primary-key != steps.cache.outputs.cache-matched-key }}
        with:
          path: ${{ steps.setup.outputs.cabal-store }}
          key: ${{ steps.cache.outputs.cache-primary-key }}

      - name: Set up Docker
        if: runner.os == 'macOS'
        uses: docker/setup-docker-action@v5

      - name: Switch Docker to Linux containers mode
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          # GitHub Actions windows-latest runners include Docker Desktop.
          # Docker Desktop defaults to Windows containers mode on Windows Server 2025,
          # so we switch it to Linux containers mode (backed by WSL2) before running tests.
          $dockerCli = 'C:\Program Files\Docker\Docker\DockerCli.exe'
          if (Test-Path $dockerCli) {
            Write-Host "Switching Docker to Linux containers mode..."
            & $dockerCli -SwitchDaemon
            # Wait for the Linux Docker daemon to become ready (up to 60 s).
            $timeout = 60
            $elapsed = 0
            do {
              Start-Sleep 2
              $elapsed += 2
              $null = docker info 2>&1
              if ($LASTEXITCODE -eq 0) {
                Write-Host "Docker is ready in Linux containers mode."
                break
              }
              Write-Host "Waiting for Docker daemon... ($elapsed / $timeout s)"
            } while ($elapsed -lt $timeout)
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Docker did not become ready within $timeout seconds."
              exit 1
            }
          } else {
            Write-Host "DockerCli.exe not found at $dockerCli; skipping mode switch."
          }

      - name: Test
        run: |
          cabal test all
